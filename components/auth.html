<!-- Auth Screen -->
<div id="auth-screen" class="screen active">
  <div class="auth-wrapper">
    <div class="auth-left">
      <div class="auth-brand">
        <div class="brand-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="12" fill="url(#grad1)"/>
            <path d="M12 28V16l8-6 8 6v12H24v-8h-8v8H12z" fill="#fff"/>
            <defs><linearGradient id="grad1" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/></linearGradient></defs>
