<!-- Add Transaction Modal -->
<div id="modal-overlay" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Transaction</h3>
      <button class="btn-icon modal-close" id="modal-close">&times;</button>
    </div>
    <form id="transaction-form">
      <div class="form-group">
        <label>Type</label>
        <div class="toggle-group">
          <button type="button" class="toggle active" data-value="expense">Expense</button>
          <button type="button" class="toggle" data-value="income">Income</button>
        </div>
        <input type="hidden" id="tx-type" value="expense">
      </div>
      <div class="form-group">
        <label for="tx-amount">Amount</label>
        <input type="number" id="tx-amount" placeholder="0.00" step="0.01" min="0" required>
      </div>
      <div class="form-group">
        <label for="tx-category">Category</label>
        <select id="tx-category">
          <option value="food">🍜 Food</option>
          <option value="transportation">🚗 Transportation</option>
          <option value="housing">🏠 Housing</option>
          <option value="utilities">💡 Utilities</option>
          <option value="entertainment">🎬 Entertainment</option>
          <option value="healthcare">🏥 Healthcare</option>
          <option value="shopping">🛍️ Shopping</option>
          <option value="education">📚 Education</option>
          <option value="salary">💼 Salary</option>
          <option value="freelance">💻 Freelance</option>
          <option value="investment">📈 Investment</option>
          <option value="other">📦 Other</option>
        </select>
      </div>
      <div class="form-group" id="expense-type-group">
        <label>Expense Classification</label>
        <div class="toggle-group">
          <button type="button" class="toggle active" data-expense="variable">Variable</button>
          <button type="button" class="toggle" data-expense="fixed">Fixed</button>
        </div>
        <input type="hidden" id="tx-expense-type" value="variable">
      </div>
      <div class="form-group">
        <label for="tx-desc">Description</label>
        <input type="text" id="tx-desc" placeholder="Enter description">
      </div>
      <div class="form-group">
        <label for="tx-date">Date</label>
        <input type="date" id="tx-date">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Save Transaction</button>
    </form>
  </div>
</div>
