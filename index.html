<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SurvivalFi — Financial Tracker & Survival Score</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- Auth Screen (component) -->
  <div id="slot-auth"></div>

  <!-- Main App -->
  <div id="app-screen" class="screen">
    <!-- Sidebar (component) -->
    <div id="slot-sidebar"></div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Main Content -->
    <main class="main-content">
      <div class="topbar">
        <button id="hamburger-btn" class="hamburger-btn" aria-label="Menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h2 id="page-title">Dashboard</h2>
        <div class="topbar-actions">
          <button id="theme-toggle" class="btn-icon" title="Toggle Theme">
            <svg id="theme-icon-dark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            <svg id="theme-icon-light" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <button id="notif-bell" class="btn-icon notif-btn" title="Notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            <span class="notif-badge" id="notif-badge" style="display:none">0</span>
          </button>
        </div>
      </div>

      <!-- Notification Panel -->
      <div id="notif-panel" class="notif-panel" style="display:none">
        <div class="notif-header">
          <h3>Notifications</h3>
          <button id="clear-notifs" class="btn-sm">Clear All</button>
        </div>
        <div id="notif-list" class="notif-list">
          <p class="empty-state">No notifications</p>
        </div>
      </div>

      <!-- Page Tabs (components) -->
      <div id="slot-dashboard"></div>
      <div id="slot-transactions"></div>
      <div id="slot-survival"></div>
      <div id="slot-settings"></div>
    </main>
  </div>

  <!-- Modal (component) -->
  <div id="slot-modal"></div>

  <!-- Component Loader (loads components, then boots main app) -->
  <script src="js/app.js"></script>
</body>
</html>
